<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | UniHostel</title>
<link rel="stylesheet" href="hostelstyle.css">
</head>
<body>

<div class="app">
<aside class="sidebar">
<h2>🎓 UniHostel</h2>
<p>Admin Panel</p>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('requests')">Room Requests</button>
<button onclick="showPage('assigned')">Assigned Rooms</button>
<button onclick="showPage('complaints')">Complaints</button>
<button onclick="logout()">Logout</button>
</aside>

<main class="main">

<section id="dashboard" class="page active">
<h1>Admin Dashboard</h1>
<div class="cards">
<div class="card"><h3>Room Requests</h3><h2 id="requestCount">0</h2></div>
<div class="card"><h3>Assigned Rooms</h3><h2 id="assignedCount">0</h2></div>
<div class="card"><h3>Complaints</h3><h2 id="adminComplaintCount">0</h2></div>
</div>
</section>

<section id="requests" class="page">
<h1>Room Requests</h1>
<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Reason</th>
<th>Assign Room</th>
</tr>
</thead>
<tbody id="requestTable"></tbody>
</table>
</section>

<section id="assigned" class="page">
<h1>Assigned Rooms</h1>
<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Room</th>
<th>Block</th>
<th>Type</th>
</tr>
</thead>
<tbody id="assignedTable"></tbody>
</table>
</section>

<section id="complaints" class="page">
<h1>Complaints</h1>
<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Complaint</th>
<th>Status</th>
</tr>
</thead>
<tbody id="adminComplaintTable"></tbody>
</table>
</section>

</main>
</div>

<script src="admin.js"></script>
</body>
</html>
