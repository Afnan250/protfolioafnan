<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Afnan Al Jedid</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Poppins,sans-serif;
    background:#0b1120;
    color:white;
}

.card{
    background:#111827;
    padding:50px;
    border-radius:20px;
    text-align:center;
    max-width:600px;

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
        0 0 15px rgba(255,255,255,0.15),
        0 0 30px rgba(255,255,255,0.10),
        0 0 60px rgba(255,255,255,0.05);
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:
        0 0 25px rgba(255,255,255,0.18),
        0 0 50px rgba(255,255,255,0.12),
        0 25px 50px rgba(0,0,0,0.4);

    transition:0.4s ease;
}


h1{
    color:#3b82f6;
}

.name{
    color:#a855f7;
    font-weight:600;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 30px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#2563eb,#9333ea);
}
</style>

</head>
<body>

<div class="card">
    <h1>🎉 Thank You!</h1>
<p>
    Dear <span class="name" id="visitor"></span>,
</p>

<p>
    Your message has been received successfully.
    Thank you for visiting my portfolio and taking the time to connect with me.
</p>

<p>
    I will review your message and get back to you as soon as possible.
</p>

<a href="index.html" class="btn">Back to Portfolio</a>

</div>

<script>
document.getElementById("visitor").innerText =
localStorage.getItem("visitorName") || "Visitor";
</script>

</body>
</html>
