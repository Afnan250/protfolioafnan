<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANO Dashboard | USTM NCC</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
body{background:linear-gradient(135deg,#fff7ef,#f4f6f9,#eefaf0);color:#071a3d}
header{background:#071a3d;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center}
header h2{color:#ff9933}.logout{background:#ff9933;color:#071a3d;padding:12px 22px;border-radius:10px;text-decoration:none;font-weight:800}
.hero{margin:25px 3%;padding:45px 7%;border-radius:28px;background:linear-gradient(#071a3ddd,#071a3df0),url("ncc2.jpeg");background-size:cover;color:white}
.dashboard{padding:30px 4%;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px}
.card{background:white;padding:28px;border-radius:22px;box-shadow:0 12px 28px #0001;border-top:5px solid #ff9933}
.card i{font-size:34px;color:#071a3d;margin-bottom:15px}
input,textarea,select{width:100%;padding:14px;margin:9px 0;border:1px solid #ccd3df;border-radius:10px}
button{background:#071a3d;color:white;padding:12px 18px;border:none;border-radius:10px;font-weight:800;cursor:pointer}
button:hover{background:#ff9933;color:#071a3d}.danger{background:#b00020}
.output{margin-top:12px;background:#fff7ef;padding:12px;border-left:5px solid #ff9933;border-radius:10px}
footer{text-align:center;background:#071a3d;color:white;padding:22px}
</style>
</head>

<body>

<header>
  <div>
    <h2>USTM NCC ANO Dashboard</h2>
    <p id="anoIdText">Loading...</p>
  </div>
  <a href="ncc.html" class="logout" onclick="logoutANO()">Logout</a>
</header>

<section class="hero">
  <h1>Administrative Control Panel</h1>
  <p>Manage notices, attendance, camp updates and cadet status.</p>
</section>

<main class="dashboard">

<div class="card">
  <i class="fa-solid fa-bullhorn"></i>
  <h3>Publish Notice</h3>
  <select id="noticeRole">
    <option value="ANO">ANO</option>
    <option value="Senior In-Charge">Senior In-Charge</option>
  </select>
  <input id="noticeTitle" placeholder="Notice Title">
  <textarea id="noticeContent" rows="5" placeholder="Write notice here"></textarea>
  <button onclick="publishNotice()">Publish Notice</button>
  <div class="output" id="noticeOutput">No notice published yet.</div>
</div>

<div class="card">
  <i class="fa-solid fa-calendar-check"></i>
  <h3>Declare Attendance</h3>
  <input id="attendanceCadetId" placeholder="Cadet ID">
  <input type="number" id="attendancePercent" placeholder="Attendance %">
  <textarea id="attendanceText" rows="4" placeholder="Regular classes and events record"></textarea>
  <button onclick="declareAttendance()">Declare Attendance</button>
</div>

<div class="card">
  <i class="fa-solid fa-campground"></i>
  <h3>Camp Update</h3>
  <textarea id="campUpdate" rows="5" placeholder="Write camp update"></textarea>
  <button onclick="declareCamp()">Publish Camp Update</button>
</div>

<div class="card">
  <i class="fa-solid fa-user-xmark"></i>
  <h3>Cancel Cadet</h3>
  <input id="cancelCadetId" placeholder="Cadet ID">
  <button class="danger" onclick="cancelCadet()">Cancel Cadet</button>
</div>

<div class="card">
  <i class="fa-solid fa-user-graduate"></i>
  <h3>Mark Batch as Passout</h3>
  <select id="passoutYear" onclick="loadBatchYears()">
    <option value="">Select Registered Year</option>
  </select>
  <button onclick="markBatchPassout()">Mark Batch Passout</button>
  <div class="output" id="batchPassoutOutput">No batch selected yet.</div>
</div>

</main>

<footer>© 2026 USTM NCC | ANO Portal</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQZMu4v6XebenpS2cG2NwYN3RYKS6NWUs",
  authDomain: "ustm-ncc-portal.firebaseapp.com",
  databaseURL: "https://ustm-ncc-portal-default-rtdb.firebaseio.com",
  projectId: "ustm-ncc-portal",
  storageBucket: "ustm-ncc-portal.firebasestorage.app",
  messagingSenderId: "164517585348",
  appId: "1:164517585348:web:119a2abdb1d871226ec491"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const anoId=localStorage.getItem("activeAnoId");
if(!anoId){
  window.location.href="ncc.html";
}else{
  document.getElementById("anoIdText").innerText=anoId;
}

function safeKey(id){
  return btoa(unescape(encodeURIComponent(id))).replaceAll("=","");
}

window.publishNotice = async function(){
  const title=document.getElementById("noticeTitle").value.trim();
  const content=document.getElementById("noticeContent").value.trim();
  const by=document.getElementById("noticeRole").value;

  if(!title || !content){
    alert("Fill all notice fields.");
    return;
  }

  await set(ref(db,"notice"),{
    title,content,by,date:new Date().toLocaleString()
  });

  document.getElementById("noticeOutput").innerText="Notice published successfully.";
  alert("Notice published.");
}

window.declareAttendance = async function(){
  const id=document.getElementById("attendanceCadetId").value.trim();
  const percent=document.getElementById("attendancePercent").value.trim();
  const text=document.getElementById("attendanceText").value.trim();

  if(!id || !percent){
    alert("Enter cadet ID and percentage.");
    return;
  }

  await set(ref(db,"attendance/"+safeKey(id)),{
    cadetId:id,percent,text,date:new Date().toLocaleString()
  });

  alert("Attendance declared.");
}

window.declareCamp = async function(){
  const camp=document.getElementById("campUpdate").value.trim();
  if(!camp){
    alert("Write camp update.");
    return;
  }

  await set(ref(db,"campUpdate"),{
    text:camp,date:new Date().toLocaleString(),by:"ANO"
  });

  alert("Camp update published.");
}

window.cancelCadet = async function(){
  const id=document.getElementById("cancelCadetId").value.trim();
  if(!id){
    alert("Enter cadet ID.");
    return;
  }

  await update(ref(db,"cadets/"+safeKey(id)),{status:"cancelled"});
  alert("Cadet cancelled.");
}

window.loadBatchYears = function(){
  const select=document.getElementById("passoutYear");
  if(select.options.length>1) return;

  const currentYear=new Date().getFullYear();
  for(let year=2023; year<=currentYear+10; year++){
    const option=document.createElement("option");
    option.value=year;
    option.textContent=year+" Batch";
    select.appendChild(option);
  }
}

window.markBatchPassout = async function(){
  const year=document.getElementById("passoutYear").value;

  if(!year){
    alert("Select registered year.");
    return;
  }

  const snap=await get(ref(db,"cadets"));
  let count=0;

  if(snap.exists()){
    const updates={};

    snap.forEach(child=>{
      const cadet=child.val();
      if(cadet.year == year){
        updates["cadets/"+child.key+"/status"]="completed";
        count++;
      }
    });

    await update(ref(db),updates);
  }

  document.getElementById("batchPassoutOutput").innerHTML =
    `<b>${year} Batch Passout Completed</b><br>Total cadets marked: ${count}`;

  alert(year+" batch cadets are now marked as passout.");
}

window.logoutANO=function(){
  localStorage.removeItem("activeAnoId");
}

document.addEventListener("DOMContentLoaded",loadBatchYears);
</script>

</body>
</html>
