<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal | UniHostel</title>
<link rel="stylesheet" href="hostelstyle.css">
</head>
<body>

<div class="app">
<aside class="sidebar">
<h2>🎓 UniHostel</h2>
<p>Student Portal</p>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('profile')">My Profile</button>
<button onclick="showPage('room')">My Room</button>
<button onclick="showPage('request')">Request Room</button>
<button onclick="showPage('entry')">Entry / Exit</button>
<button onclick="showPage('complaint')">Complaints</button>
<button onclick="logout()">Logout</button>
</aside>

<main class="main">

<section id="dashboard" class="page active">
<h1>Student Dashboard</h1>
<p>Welcome, <span id="studentName"></span></p>

<div class="cards">
<div class="card"><h3>Room Status</h3><h2 id="roomStatus">Pending</h2></div>
<div class="card"><h3>Room Number</h3><h2 id="studentRoom">Not Assigned</h2></div>
<div class="card"><h3>Complaints</h3><h2 id="complaintCount">0</h2></div>
<div class="card"><h3>Last Entry</h3><h2 id="lastEntry">--</h2></div>
</div>
</section>

<section id="profile" class="page">
<h1>My Profile</h1>
<div class="panel">
<p><b>Name:</b> <span id="profileName"></span></p>
<p><b>Roll Number:</b> <span id="profileRoll"></span></p>
<p><b>Department:</b> BCA</p>
<p><b>Room:</b> <span id="profileRoom">Not Assigned</span></p>
</div>
</section>

<section id="room" class="page">
<h1>My Room</h1>
<div class="panel" id="roomDetails"></div>
</section>

<section id="request" class="page">
<h1>Request Room</h1>
<div class="panel">
<input type="text" id="requestReason" placeholder="Reason for hostel room request">
<button onclick="requestRoom()">Submit Room Request</button>
<p id="requestMsg"></p>
</div>
</section>

<section id="entry" class="page">
<h1>Entry / Exit</h1>
<div class="panel">
<button onclick="markEntry()">Mark Entry</button>
<button onclick="markExit()">Mark Exit</button>
</div>
<table>
<thead><tr><th>Date</th><th>Entry</th><th>Exit</th></tr></thead>
<tbody id="entryTable"></tbody>
</table>
</section>

<section id="complaint" class="page">
<h1>Complaints</h1>
<div class="panel">
<input type="text" id="complaintText" placeholder="Write your complaint">
<button onclick="addComplaint()">Submit Complaint</button>
</div>
<table>
<thead><tr><th>Complaint</th><th>Status</th></tr></thead>
<tbody id="complaintTable"></tbody>
</table>
</section>

</main>
</div>

<script src="student.js"></script>
</body>
</html>
