<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniHostel Login</title>
<link rel="stylesheet" href="login.css">

<!-- Font Awesome Fix -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="login-card">
  <h1><i class="fa-solid fa-graduation-cap"></i> UniHostel</h1>
  <p>University Hostel Management System</p>

  <div class="tabs">
    <button id="studentBtn" class="active" onclick="setRole('student')">Student</button>
    <button id="adminBtn" onclick="setRole('admin')">Admin</button>
  </div>

  <div class="input-box">
    <i class="fa-solid fa-id-card"></i>
    <input type="text" id="userId" placeholder="Enter Roll Number">
  </div>

  <div class="captcha-box">
    <span id="captchaText"></span>
    <button onclick="generateCaptcha()">↻</button>
  </div>

  <div class="input-box">
    <i class="fa-solid fa-shield-halved"></i>
    <input type="text" id="captchaInput" placeholder="Enter Captcha">
  </div>

  <button class="main-btn" onclick="loginUser()">Login</button>

  <p id="message"></p>
</div>

<script src="login.js"></script>
</body>
</html>
