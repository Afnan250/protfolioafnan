<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | UniHostel</title>
  <link rel="stylesheet" href="student-login.css">
</head>
<body>

<div class="login-box">
  <h1>🎓 UniHostel</h1>
  <h2 id="loginTitle">Student Login</h2>

  <div class="role-buttons">
    <button onclick="setRole('student')">Student</button>
    <button onclick="setRole('admin')">Admin</button>
  </div>

  <input type="text" id="userId" placeholder="Enter Student Roll Number">

  <div class="captcha-row">
    <span id="captchaText"></span>
    <button onclick="generateCaptcha()">↻</button>
  </div>

  <input type="text" id="captchaInput" placeholder="Enter Captcha">

  <button onclick="generateOTP()">Generate OTP</button>

  <p id="otpShow"></p>

  <input type="text" id="otpInput" placeholder="Enter OTP">

  <button onclick="loginUser()">Login</button>

  <p id="message"></p>
</div>

<script src="login.js"></script>
</body>
</html>
