<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniHostel Login</title>
<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="overlay"></div>

<div class="login-card">

  <div class="logo">
    <i class="fa-solid fa-graduation-cap"></i>
    <h1>UniHostel</h1>
    <p>University Hostel Management System</p>
  </div>

  <div class="tabs">
    <button class="active" onclick="showLogin()">Login</button>
    <button onclick="showRegister()">Register</button>
  </div>

  <form id="loginForm" class="form active-form">
    <div class="role-switch">
      <button type="button" class="active">Student</button>
      <button type="button">Admin</button>
    </div>

    <div class="input-box">
      <i class="fa-solid fa-id-card"></i>
      <input type="text" placeholder="Enter Roll Number / Admin ID">
    </div>

    <div class="captcha">
      <span>KP98TZ</span>
      <button type="button">↻</button>
    </div>

    <div class="input-box">
      <i class="fa-solid fa-shield-halved"></i>
      <input type="text" placeholder="Enter Captcha">
    </div>

    <button type="button" class="main-btn">Generate OTP</button>

    <div class="input-box">
      <i class="fa-solid fa-key"></i>
      <input type="text" placeholder="Enter OTP">
    </div>

    <button type="button" class="main-btn">Login</button>
  </form>

  <form id="registerForm" class="form">
    <div class="input-box">
      <i class="fa-solid fa-user"></i>
      <input type="text" placeholder="Full Name">
    </div>

    <div class="input-box">
      <i class="fa-solid fa-id-card"></i>
      <input type="text" placeholder="Roll Number">
    </div>

    <div class="input-box">
      <i class="fa-solid fa-building"></i>
      <input type="text" placeholder="Department">
    </div>

    <div class="input-box">
      <i class="fa-solid fa-door-open"></i>
      <input type="text" placeholder="Room Number">
    </div>

    <div class="input-box">
      <i class="fa-solid fa-phone"></i>
      <input type="text" placeholder="Phone Number">
    </div>

    <button type="button" class="main-btn">Register</button>
  </form>

</div>

<script>
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const tabBtns = document.querySelectorAll(".tabs button");

function showLogin(){
  loginForm.classList.add("active-form");
  registerForm.classList.remove("active-form");
  tabBtns[0].classList.add("active");
  tabBtns[1].classList.remove("active");
}

function showRegister(){
  registerForm.classList.add("active-form");
  loginForm.classList.remove("active-form");
  tabBtns[1].classList.add("active");
  tabBtns[0].classList.remove("active");
}
</script>

</body>
</html>
