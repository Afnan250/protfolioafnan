<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USTM NCC Connect</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#082f57;
}

.connect-section{
    min-height:100vh;
    padding:100px 20px;
    text-align:center;
}

.connect-section h2{
    color:white;
    font-size:42px;
    font-weight:900;
    margin-bottom:25px;
}

.line{
    display:flex;
    justify-content:center;
    margin-bottom:60px;
}

.line span{
    width:80px;
    height:6px;
}

.orange{
    background:#ff7a00;
}

.white{
    background:white;
}

.green{
    background:#18a84f;
}

.connect-container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:30px;
}

.connect-card{
    background:white;
    border-radius:20px;
    padding:40px 20px;
    border:3px solid #ff7a00;
    box-shadow:4px 4px 0 #18a84f;
    transition:.3s;
}

.connect-card:hover{
    transform:translateY(-8px);
}

.connect-card i{
    font-size:60px;
    margin-bottom:20px;
}

.fa-instagram{
    color:#E1306C;
}

.fa-facebook-f{
    color:#1877F2;
}

.fa-whatsapp{
    color:#25D366;
}

.fa-envelope{
    color:#EA4335;
}

.connect-card h3{
    color:#082f57;
    margin-bottom:10px;
}

.connect-card p{
    color:#666;
}

@media(max-width:900px){

.connect-container{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.connect-container{
grid-template-columns:1fr;
}

.connect-section h2{
font-size:28px;
}

}

</style>
</head>

<body>

<section class="connect-section">

<h2>CONNECT WITH USTM NCC</h2>

<div class="line">
<span class="orange"></span>
<span class="white"></span>
<span class="green"></span>
</div>

<div class="connect-container">

<div class="connect-card">
<i class="fa-brands fa-instagram"></i>
<h3>Instagram</h3>
<p>@ustmncc_warriors</p>
</div>

<div class="connect-card">
<i class="fa-brands fa-facebook-f"></i>
<h3>Facebook</h3>
<p>USTM NCC Unit</p>
</div>

<div class="connect-card">
<i class="fa-brands fa-whatsapp"></i>
<h3>WhatsApp</h3>
<p>USTM NCC Updates</p>
</div>

<div class="connect-card">
<i class="fa-solid fa-envelope"></i>
<h3>Email</h3>
<p>ustmnccwarriors@gmail.com</p>
</div>

</div>

</section>

</body>
</html>
```
