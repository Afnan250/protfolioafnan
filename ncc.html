```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USTM NCC Connect</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#082f57;
}

.connect-section{
    min-height:100vh;
    padding:100px 30px;
    text-align:center;
}

.connect-section h2{
    color:#fff;
    font-size:3rem;
    font-weight:800;
    margin-bottom:30px;
    text-transform:uppercase;
}

.line{
    display:flex;
    justify-content:center;
    margin-bottom:70px;
}

.line span{
    width:75px;
    height:6px;
}

.orange{
    background:#ff7a00;
    border-radius:10px 0 0 10px;
}

.white{
    background:#ffffff;
}

.green{
    background:#1ba94c;
    border-radius:0 10px 10px 0;
}

.connect-container{
    max-width:1400px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:35px;
}

.connect-card{
    background:linear-gradient(
        135deg,
        #ffffff 60%,
        #fff3e6 60%
    );
    border-radius:22px;
    padding:40px 20px;
    border:3px solid #ff7a00;
    box-shadow:4px 4px 0 #1ba94c;
    transition:.4s;
}

.connect-card:hover{
    transform:translateY(-10px);
    box-shadow:0 20px 35px rgba(255,255,255,.15);
}

.connect-card i{
    font-size:60px;
    margin-bottom:25px;
}

.instagram{
    color:#E1306C;
}

.facebook{
    color:#1877F2;
}

.whatsapp{
    color:#25D366;
}

.email{
    color:#EA4335;
}

.connect-card h3{
    color:#082f57;
    font-size:2rem;
    margin-bottom:15px;
}

.connect-card p{
    color:#666;
    font-size:1.1rem;
}

.connect-card a{
    text-decoration:none;
    color:inherit;
}

@media(max-width:1100px){

    .connect-container{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:700px){

    .connect-section h2{
        font-size:2rem;
    }

    .connect-container{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<section class="connect-section">

    <h2>CONNECT WITH USTM NCC</h2>

    <div class="line">
        <span class="orange"></span>
        <span class="white"></span>
        <span class="green"></span>
    </div>

    <div class="connect-container">

        <a href="https://www.instagram.com/ustmncc_warriors" target="_blank">
            <div class="connect-card">
                <i class="fa-brands fa-instagram instagram"></i>
                <h3>Instagram</h3>
                <p>@ustmncc_warriors</p>
            </div>
        </a>

        <a href="#" target="_blank">
            <div class="connect-card">
                <i class="fa-brands fa-facebook-f facebook"></i>
                <h3>Facebook</h3>
                <p>USTM NCC Unit</p>
            </div>
        </a>

        <a href="#" target="_blank">
            <div class="connect-card">
                <i class="fa-brands fa-whatsapp whatsapp"></i>
                <h3>WhatsApp Channel</h3>
                <p>USTM NCC Updates</p>
            </div>
        </a>

        <a href="mailto:ustmnccwarriors@gmail.com">
            <div class="connect-card">
                <i class="fa-solid fa-envelope email"></i>
                <h3>Email</h3>
                <p>ustmnccwarriors@gmail.com</p>
            </div>
        </a>

    </div>

</section>

</body>
</html>
```
